<!DOCTYPE html>
<html>

<head>
    <title>Employee Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
        }

        .card {
            border-radius: 15px;
        }

        .btn {
            min-width: 120px;
        }
    </style>
</head>

<body class="text-white">

    <div class="container py-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>📍 Employee Dashboard</h3>
            <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
        </div>

        <!-- Trip Controls -->
        <div class="card bg-dark p-4 text-center shadow">
            <h5 class="mb-3">Trip Controls</h5>

            <button class="btn btn-success m-2" onclick="startTrip()">Start Trip</button>
            <button class="btn btn-warning m-2" onclick="endTrip()">End Trip</button>

            <p id="status" class="mt-3">Status: Idle</p>
        </div>

    </div>

    <script>
        let trackingInterval = null;

        /* ================= START TRIP ================= */
        function startTrip() {

            console.log("🚀 Start button clicked");

            if (!navigator.geolocation) {
                alert("Geolocation not supported");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function (position) {

                    let lat = position.coords.latitude;
                    let lng = position.coords.longitude;

                    console.log("📍 START LAT/LNG:", lat, lng);

                    fetch('/start-trip/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCSRFToken()
                        },
                        credentials: 'same-origin',
                        body: JSON.stringify({
                            latitude: lat,
                            longitude: lng
                        })
                    })
                        .then(response => {
                            console.log("📡 RAW RESPONSE:", response);
                            return response.json();
                        })
                        .then(data => {
                            console.log("✅ START RESPONSE:", data);

                            if (data.status === "started") {
                                document.getElementById('status').innerText = "Tracking started...";
                                startTracking();
                            }
                            else if (data.status === "NO DATA") {
                                alert("❌ No location data sent!");
                            }
                            else {
                                alert("❌ Trip not started! Check backend.");
                            }
                        })
                        .catch(error => {
                            console.error("❌ FETCH ERROR:", error);
                            alert("Error starting trip. Check console.");
                        });

                },

                function (error) {
                    console.error("❌ GEOLOCATION ERROR:", error);

                    if (error.code === 1) {
                        alert("Location permission denied!");
                    } else {
                        alert("Unable to fetch location.");
                    }
                }
            );
        }

        /* ================= AUTO TRACK ================= */
        function startTracking() {

            console.log("📡 Tracking started...");

            if (trackingInterval) {
                clearInterval(trackingInterval);
            }

            trackingInterval = setInterval(() => {

                if (!navigator.geolocation) {
                    console.error("Geolocation not supported");
                    return;
                }

                navigator.geolocation.getCurrentPosition(

                    function (position) {

                        let lat = position.coords.latitude;
                        let lng = position.coords.longitude;

                        console.log("📍 SENDING LOCATION:", lat, lng);

                        fetch('/update-location/', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': getCSRFToken()
                            },
                            credentials: 'same-origin',
                            body: JSON.stringify({
                                latitude: lat,
                                longitude: lng
                            })
                        })
                            .then(res => res.json())
                            .then(data => {
                                console.log("📡 TRACK RESPONSE:", data);

                                if (data.status === "NO ACTIVE TRIP") {
                                    console.warn("⚠ No active trip found!");

                                    // 🔥 STOP tracking ONLY if truly no trip
                                    clearInterval(trackingInterval);

                                    document.getElementById('status').innerText = "⚠ Trip not active!";
                                }
                            })
                            .catch(err => {
                                console.error("❌ TRACK ERROR:", err);
                            });

                    },

                    function (error) {
                        console.error("❌ GPS ERROR:", error);
                    }

                );

            }, 5000);
        }

        /* ================= END TRIP ================= */
        function endTrip() {

            navigator.geolocation.getCurrentPosition(function (position) {

                fetch('/end-trip/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': getCSRFToken()
                    },
                    credentials: 'same-origin',
                    body: `latitude=${position.coords.latitude}&longitude=${position.coords.longitude}`
                })
                    .then(res => res.json())
                    .then(data => {
                        console.log("END RESPONSE:", data);
                        document.getElementById('status').innerText = "Trip Ended";
                    });

                clearInterval(trackingInterval);

            }, errorHandler);
        }

        /* ================= CSRF TOKEN ================= */
        function getCSRFToken() {
            return document.cookie.split('; ')
                .find(row => row.startsWith('csrftoken'))
                ?.split('=')[1];
        }

        /* ================= ERROR HANDLER ================= */
        function errorHandler(error) {
            console.error("GPS ERROR:", error);
            alert("Location access required for tracking!");
        }
    </script>

</body>

</html>
